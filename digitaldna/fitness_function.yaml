fitness_function:
  version: "1.0"
  created: "2026-04-17"
  description: >
    Funzione di fitness per selezione mutazioni non caotiche.
    Guida l'evoluzione di SPEACE verso obiettivi Rigene Project.

  weights:
    speace_alignment_score: 0.35
    task_success_rate: 0.25
    system_stability: 0.20
    resource_efficiency: 0.15
    ethical_compliance: 0.05

  formula: >
    fitness = (alignment * 0.35) + (success_rate * 0.25) +
              (stability * 0.20) + (efficiency * 0.15) +
              (ethics * 0.05)

  normalization:
    method: "min_max"
    range:
      min: 0.0
      max: 1.0
    clip: true

  thresholds:
    min_fitness_to_apply: 0.60
    min_fitness_to_survive: 0.50
    mutation_selection_probability: "fitness / max_fitness"
    excellent_threshold: 0.85
    poor_threshold: 0.40

  evaluation_frequency:
    after_each_mutation: true
    periodic: 60  # minutes
    on_alignment_drift: true
    on_performance_drop: true

  metrics_collection:
    alignment_score:
      source: "tina_alignment.score"
      update_frequency: "per heartbeat"
    success_rate:
      source: "system_state.task_success_rate"
      window: "last 100 tasks"
    stability:
      source: "system_state.stability"
      window: "last 24 hours"
    efficiency:
      source: "system_state.efficiency"
      window: "last 100 tasks"
    ethics:
      source: "system_state.ethics_compliance"
      update_frequency: "per action"

  example_calculations:
    excellent_scenario:
      alignment: 0.90
      success_rate: 0.85
      stability: 0.95
      efficiency: 0.80
      ethics: 0.95
      result: 0.8875
      classification: "EXCELLENT"
    good_scenario:
      alignment: 0.75
      success_rate: 0.80
      stability: 0.85
      efficiency: 0.75
      ethics: 0.90
      result: 0.7925
      classification: "GOOD"
    acceptable_scenario:
      alignment: 0.60
      success_rate: 0.70
      stability: 0.80
      efficiency: 0.75
      ethics: 0.90
      result: 0.7075
      classification: "ACCEPTABLE"
    low_scenario:
      alignment: 0.40
      success_rate: 0.50
      stability: 0.60
      efficiency: 0.70
      ethics: 0.80
      result: 0.5325
      classification: "LOW - mutation rejected"

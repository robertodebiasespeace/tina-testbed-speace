name: SPEACE CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate YAML configs
        run: |
          pip install pyyaml
          for f in digitaldna/genome.yaml digitaldna/epigenome.yaml \
                   digitaldna/mutation_rules.yaml digitaldna/fitness_function.yaml; do
            if [ -f "$f" ]; then
              python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "OK: $f"
            else
              echo "SKIP: $f (not found)"
            fi
          done

      - name: Check required files
        run: |
          for f in README.md LICENSE requirements.txt pyproject.toml; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "FOUND: $f"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install flake8

      - name: Lint Python files
        run: |
          flake8 SPEACE_Cortex/ scripts/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402 \
            --count \
            --show-source \
            --statistics || true

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse-check all .py files
        run: |
          python3 -c "
          import os, sys, ast, pathlib
          ROOT = pathlib.Path('.')
          errors = []
          for d in ['SPEACE_Cortex', 'scripts', 'safe-proactive', 'scientific-team']:
              if not ROOT.joinpath(d).is_dir():
                  errors.append(f'Missing directory: {d}')
          for pattern in ['SPEACE_Cortex/**/*.py', 'scripts/**/*.py',
                          'safe-proactive/**/*.py', 'scientific-team/**/*.py']:
              for py_file in ROOT.glob(pattern):
                  try:
                      ast.parse(py_file.read_text())
                  except SyntaxError as e:
                      errors.append(f'Syntax error in {py_file}: {e}')
          if errors:
              print('ERRORS:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          print('Smoke test passed')
          "

# SPEACE MQTT Broker Configuration
# Mosquitto Configuration File
# Versione: 1.0
# Data: 21 aprile 2026

# =============================================================================
# LISTENER CONFIGURATION
# =============================================================================

# Standard MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (opzionale, per web dashboard)
listener 9001
protocol websockets

# =============================================================================
# AUTHENTICATION (per produzione, abilitare)
# =============================================================================

# Per testing: anonymous access permesso
# Per produzione: commentare e usare password_file
allow_anonymous true

# Autenticazione (disabilitata per testing)
# password_file /etc/mosquitto/passwd
# acl_file /etc/mosquitto/acl

# =============================================================================
# PERSISTENCE
# =============================================================================

persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db

# Autosave ogni 15 minuti o ogni 100 messaggi
autosave_interval 900
autosave_on_changes false

# =============================================================================
# LOGGING
# =============================================================================

log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout

log_type error
log_type warning
log_type information
log_type notice

connection_messages true

# =============================================================================
# SECURITY
# =============================================================================

# TLS/SSL (opzionale, raccomandato per produzione)
# listener 8883
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# require_certificate false
# use_identity_as_username false

# =============================================================================
# MESSAGE HANDLING
# =============================================================================

# QoS 1/2 messages
max_inflight_messages 20
max_queued_messages 1000
max_queued_bytes 0

# Message size limit (1MB)
message_size_limit 1048576

# Retained messages
retained_persistence true

# =============================================================================
# TOPIC STRUCTURE - SPEACE
# =============================================================================

# speace/sensors/+/+     - Sensori fisici (tipo/id)
# speace/alerts/+        - Alert system
# speace/agents/+        - Comunicazione agenti
# speace/swarm/+         - Swarm coordination
# speace/commands/+      - Comandi umani
# speace/status/+        - Status reports

# =============================================================================
# BRIDGING (opzionale - per cluster multipli)
# =============================================================================

# connection bridge_name
# address remote_broker:1883
# topic # both 0

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================

# File descriptor limit
# max_connections -1  # Illimitato

# Memory limit (in bytes)
# memory_limit 0  # Illimitato

# =============================================================================
# MONITORING (opzionale)
# =============================================================================

# $SYS topic publishing
sys_interval 60

# =============================================================================
# SPEACE SPECIFIC CONFIGURATION
# =============================================================================

# Permettere retained messages per configurazione
# Permettere QoS 1 e 2

# Custom plugin (se necessario)
# plugin /usr/lib/mosquitto/auth_plugin.so

# =============================================================================
# END OF CONFIGURATION
# =============================================================================
